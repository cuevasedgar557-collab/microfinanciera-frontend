<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTÍVATE - Inicio de Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <h1>ACTÍVATE</h1>

        <h2>Iniciar sesión</h2>

        <p class="login-desc">
            Sistema privado para la gestión de clientes,
            préstamos y cobros.
        </p>

        <input id="loginUsuario" placeholder="Usuario">
        <input id="loginPassword" type="password" placeholder="Contraseña">

        <button id="loginBtn" onclick="login()" type="button">
            <span class="btn-text">Entrar</span>
            <span class="btn-loader" aria-hidden="true"></span>
        </button>

        <p id="loginMsg"></p>

        <div class="login-footer">
            <a href="nosotros.html">Quiénes Somos</a>
            <span>•</span>
            <a href="privacidad.html">Privacidad</a>
            <span>•</span>
            <a href="contacto.html">Contacto</a>
        </div>

    </div>

</div>

<script src="js/config.js"></script>

<script>
function setLoginLoading(isLoading) {
  const btn = document.getElementById("loginBtn");
  const text = btn.querySelector(".btn-text");
  const loader = btn.querySelector(".btn-loader");

  btn.disabled = isLoading;
  btn.classList.toggle("is-loading", isLoading);
  text.textContent = isLoading ? "Entrando..." : "Entrar";
  loader.style.display = isLoading ? "inline-block" : "none";
}

function login() {
  const usuario = document.getElementById("loginUsuario").value;
  const password = document.getElementById("loginPassword").value;

  setLoginLoading(true);

  fetch(`${API_URL}/api/auth/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ usuario, password })
  })
    .then(res => res.json())
    .then(data => {
      if (data.token) {

        console.log("LOGIN RESPONSE:", data);

        localStorage.setItem("token", data.token);

        localStorage.setItem(
          "usuario_nombre",
          data.usuario.nombre || data.usuario.nombre_completo || "Administrador"
        );

        localStorage.setItem(
          "usuario_user",
          data.usuario.usuario || data.usuario.username || ""
        );

        window.location.href = "index.html";

      } else {
        document.getElementById("loginMsg").innerText =
          data.mensaje || "Error de login";
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById("loginMsg").innerText =
        "Error de conexión";
    })
    .finally(() => {
      setLoginLoading(false);
    });
}
</script>

</body>
</html>
